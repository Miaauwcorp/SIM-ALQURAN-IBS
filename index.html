<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SISTEM MANAJEMEN SAQU SANTRI</title>
  <link rel="icon" href="https://ibs.sch.id/assets/icon/LOGO%20IBS%20BARU.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxv29VDLzUWt-J6rEL-KcqylOGqilnPiijfibo-xj6mX7Pu3kAz6l1av9OkMddtX_Kw-Q/exec";

    function buildIframeUrl() {
      const currentParams = new URLSearchParams(window.location.search);
      const iframeParams = new URLSearchParams();

      const page = currentParams.get("page") || "";
      const nama = currentParams.get("nama") || "";

      if (page) iframeParams.set("page", page);
      if (nama) iframeParams.set("nama", nama);

      const query = iframeParams.toString();
      return query ? `${GAS_URL}?${query}` : GAS_URL;
    }

    document.getElementById("app").src = buildIframeUrl();

    window.addEventListener("message", function (event) {
      const data = event.data || {};

      if (!data || data.type !== "SIM_GOOGLE_SSO_RESULT") return;

      const iframe = document.getElementById("app");
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage(data, "*");
      }
    });
  </script>
</body>
</html>
